<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>周波数当てゲーム - Auto Ranking</title>
    <style>
        :root { --bg: #1a1a1a; --panel: #2d2d2d; --blue: #00d4ff; --text: #e0e0e0; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; min-height: 100vh; padding: 20px 0; }
        #container { width: 90%; max-width: 400px; background: var(--panel); padding: 20px; border-radius: 15px; text-align: center; }
        .screen { display: none; }
        input[type="text"] { width: 80%; padding: 10px; margin: 10px 0; background: #444; color: #fff; border: none; border-radius: 5px; }
        button { background: var(--blue); border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; margin: 5px; }
        canvas { width: 100%; background: #000; border-radius: 10px; margin: 10px 0; }
        #rankingBox { margin-top: 30px; border-top: 1px solid #444; text-align: left; padding-top: 10px; }
        .rank-item { display: flex; justify-content: space-between; font-size: 14px; padding: 5px 0; border-bottom: 1px solid #333; }
        #countdownOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; font-size: 60px; color: var(--blue); z-index: 100; }
    </style>
</head>
<body>

<div id="container">
    <div id="startScreen" class="screen" style="display:block;">
        <h1>HEARING TEST</h1>
        <input type="text" id="playerName" placeholder="名前を入力" maxlength="10">
        <button onclick="startGame()">START</button>
    </div>

    <div id="gameScreen" class="screen">
        <div id="qNum"></div>
        <canvas id="analyzer" height="100"></canvas>
        <div style="font-size:24px; margin:10px;"><span id="freqVal">1000</span>Hz</div>
        <input type="range" id="slider" min="50" max="2000" value="1000" style="width:100%;" oninput="document.getElementById('freqVal').innerText=this.value">
        <button onclick="submitAnswer()">決定</button>
    </div>

    <div id="resultScreen" class="screen">
        <h2>RESULT</h2>
        <div id="resultText" style="font-size:20px; margin-bottom:10px;"></div>
        <button onclick="copyToClipboard()">結果をコピー</button>
        <button onclick="location.reload()">もう一度</button>
        
        <div id="rankingBox">
            <h3 style="color:var(--blue)">🏆 TOP 20 RANKING</h3>
            <div id="rankingList">読み込み中...</div>
        </div>
    </div>
</div>

<div id="countdownOverlay"></div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyqiSF0p8CByeyg7atWH9dZGPC5Izi8Xn_LcY9Yrs9j6MS1a0agp0wJKkehH1cul9iD4Q/exec";


let audioCtx, analyser, gainNode, correctFreq, qIdx = 0, totalErr = 0;
const totalQs = 3;

function startGame() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    gainNode = audioCtx.createGain();
    gainNode.gain.value = 0.5;
    analyser.connect(audioCtx.destination);
    gainNode.connect(analyser);
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("gameScreen").style.display = "block";
    nextQ();
}

function nextQ() {
    qIdx++;
    if(qIdx > totalQs) { showResult(); return; }
    correctFreq = Math.floor(Math.random() * 1900 + 50);
    document.getElementById("qNum").innerText = `第 ${qIdx} 問 / ${totalQs}`;
    
    const ov = document.getElementById("countdownOverlay");
    ov.style.display = "flex";
    ov.innerText = "3";
    let c = 3;
    let timer = setInterval(() => {
        c--;
        if(c > 0) ov.innerText = c;
        else {
            clearInterval(timer);
            ov.style.display = "none";
            const osc = audioCtx.createOscillator();
            osc.frequency.value = correctFreq;
            osc.connect(gainNode);
            osc.start();
            setTimeout(() => osc.stop(), 1500);
        }
    }, 1000);
}

function submitAnswer() {
    totalErr += Math.abs(document.getElementById("slider").value - correctFreq);
    nextQ();
}

function showResult() {
    document.getElementById("gameScreen").style.display = "none";
    document.getElementById("resultScreen").style.display = "block";
    const avg = Math.round(totalErr / totalQs);
    const name = document.getElementById("playerName").value || "ゲスト";
    document.getElementById("resultText").innerText = `${name}さんの平均誤差: ${avg}Hz`;

    // 自動送信 & 取得
    updateRanking(name, avg);
}

async function updateRanking(name, score) {
    const mode = new URLSearchParams(window.location.search).get('mode') || "Spoon";
    
    // 1. 送信 (POST)
    await fetch(GAS_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({ name: name, score: score, mode: mode })
    });

    // 2. 取得 (GET)
    const resp = await fetch(`${GAS_URL}?mode=${mode}`);
    const data = await resp.json();
    
    const list = document.getElementById("rankingList");
    list.innerHTML = data.map((r, i) => `
        <div class="rank-item">
            <span>${i+1}. ${r.name}</span>
            <span>${Math.round(r.score)}Hz</span>
        </div>
    `).join('');
}

function copyToClipboard() {
    const avg = Math.round(totalErr / totalQs);
    const txt = `🎧 周波数当てゲーム\n平均誤差: ${avg}Hz\n${window.location.href}`;
    navigator.clipboard.writeText(txt).then(() => alert("コピーしました！"));
}
</script>
</body>
</html>
