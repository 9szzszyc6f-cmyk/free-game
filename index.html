<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>周波数当てゲーム - Professional Edition</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-color: #2d2d2d;
            --accent-blue: #00d4ff;
            --accent-red: #ff4757;
            --text-color: #e0e0e0;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            width: 100%;
            max-width: 400px;
            background: var(--panel-color);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
        }
        h1 { font-size: 20px; color: var(--accent-blue); margin-bottom: 20px; }
        .screen { display: none; }
        #startScreen { display: block; }
        
        /* 入力エリア */
        input[type="text"] {
            width: 80%;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
            border: none;
            background: #444;
            color: white;
            text-align: center;
        }

        /* スライダー */
        .slider-container { margin: 30px 0; }
        input[type="range"] {
            width: 100%;
            height: 15px;
            border-radius: 5px;
            background: #444;
            outline: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: var(--accent-blue);
            cursor: pointer;
        }

        /* ボタン */
        button {
            background: var(--accent-blue);
            color: black;
            border: none;
            padding: 12px 30px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        button:active { transform: scale(0.95); }

        /* カウントダウン・オーバーレイ */
        #countdownOverlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 80px;
            font-weight: bold;
            color: var(--accent-blue);
            border-radius: 15px;
            z-index: 10;
        }

        /* アナライザーとグラフ */
        canvas {
            width: 100%;
            background: black;
            border-radius: 10px;
            margin: 10px 0;
        }
        #graph { height: 150px; background: #eee; }

        /* ランク表示 */
        .rank-badge { font-size: 32px; font-weight: bold; margin: 10px 0; }
        .s-rank { color: #f1c40f; text-shadow: 0 0 10px rgba(241,196,15,0.5); }
        .a-rank { color: #e74c3c; }
        .b-rank { color: #3498db; }
        .c-rank { color: #95a5a6; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- スタート画面 -->
    <div id="startScreen" class="screen">
        <h1>HEARING TEST PRO</h1>
        <p>名前を入力してスタート</p>
        <input type="text" id="playerName" placeholder="名前を入力" maxlength="10">
        <br>
        <button onclick="startGame()">GAME START</button>
    </div>

    <!-- ゲーム画面 -->
    <div id="gameScreen" class="screen">
        <div id="question" style="font-weight: bold; margin-bottom: 10px;"></div>
        <canvas id="analyzerCanvas" height="100"></canvas>
        <div class="slider-container">
            <div style="font-size: 24px; margin-bottom: 10px;"><span id="freqValue">1000</span> Hz</div>
            <input type="range" id="slider" min="50" max="2000" value="1000" oninput="updateSlider()">
        </div>
        <button onclick="submitAnswer()">決定</button>
    </div>

    <!-- 結果画面 -->
    <div id="resultScreen" class="screen">
        <h2>RESULT</h2>
        <div id="rankText" class="rank-badge"></div>
        <p id="resultText"></p>
        <canvas id="graph" width="400" height="150"></canvas>
        <button onclick="copyToClipboard()" style="background: #27ae60; color: white; margin-bottom: 10px;">結果をコピー</button>
        <div id="copyStatus" style="font-size: 12px; height: 15px; margin-bottom: 10px; color: #27ae60;"></div>
        <br>
        <button onclick="resetGame()">もう一度プレイ</button>
    </div>

    <!-- カウントダウン用 -->
    <div id="countdownOverlay"></div>
</div>

<script>
// --- 設定：あなたのGASのURL ---
const GAS_URL = "https://script.google.com/macros/s/AKfycby7HQF0uK34YGYGZp3C-Q25Nthmsj44HBVVOSW7bA-uWp8XtbAqnHA3oUZK6UXNvMtfZg/exec";

let audioCtx, analyser, gainNode, dataArray;
let correctFreq = 0, questionIndex = 0, totalError = 0;
const totalQuestions = 3;
let results = [];

function updateSlider() {
    document.getElementById("freqValue").innerText = document.getElementById("slider").value;
}

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        gainNode = audioCtx.createGain();
        gainNode.gain.value = 0.5;
        analyser.connect(audioCtx.destination);
        gainNode.connect(analyser);
        dataArray = new Uint8Array(analyser.frequencyBinCount);
    }
}

function startGame() {
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("gameScreen").style.display = "block";
    drawAnalyzer();
    nextQuestion();
}

function nextQuestion() {
    correctFreq = Math.floor(Math.random() * 1900 + 50);
    questionIndex++;
    document.getElementById("question").innerText = `第 ${questionIndex} 問 / ${totalQuestions}`;
    startCountdown();
}

function startCountdown() {
    let count = 3;
    const overlay = document.getElementById("countdownOverlay");
    overlay.innerHTML = `<div style="font-size: 40px; margin-bottom: 10px;">第 ${questionIndex} 問</div>`;
    overlay.style.display = "flex";

    setTimeout(() => {
        overlay.innerText = count;
        const interval = setInterval(() => {
            count--;
            if (count <= 0) {
                clearInterval(interval);
                overlay.style.display = "none";
                playTone();
            } else {
                overlay.innerText = count;
            }
        }, 1000);
    }, 1000);
}

function playTone() {
    const osc = audioCtx.createOscillator();
    osc.type = "sine";
    osc.frequency.setValueAtTime(correctFreq, audioCtx.currentTime);
    osc.connect(gainNode);
    osc.start();
    setTimeout(() => { osc.stop(); osc.disconnect(); }, 1500);
}

function drawAnalyzer() {
    requestAnimationFrame(drawAnalyzer);
    if (!analyser) return;
    const canvas = document.getElementById("analyzerCanvas");
    const ctx = canvas.getContext("2d");
    analyser.getByteTimeDomainData(dataArray);
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.lineWidth = 2;
    ctx.strokeStyle = "#00d4ff";
    ctx.beginPath();
    const sliceWidth = canvas.width / dataArray.length;
    let x = 0;
    for (let i = 0; i < dataArray.length; i++) {
        const v = dataArray[i] / 128.0;
        const y = v * canvas.height / 2;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        x += sliceWidth;
    }
    ctx.lineTo(canvas.width, canvas.height / 2);
    ctx.stroke();
}

function submitAnswer() {
    const userFreq = Number(document.getElementById("slider").value);
    const error = Math.abs(userFreq - correctFreq);
    totalError += error;
    results.push({ correct: Math.round(correctFreq), answer: userFreq, error: Math.round(error) });
    if (questionIndex < totalQuestions) nextQuestion(); else showResult();
}

function showResult() {
    document.getElementById("gameScreen").style.display = "none";
    document.getElementById("resultScreen").style.display = "block";
    const avgError = Math.round(totalError / totalQuestions);
    const name = document.getElementById("playerName").value || "名無し";
    
    let rank = "", rankName = "", rankClass = "";
    if (avgError < 50) { rank = "S"; rankName = "神の耳"; rankClass = "s-rank"; }
    else if (avgError < 150) { rank = "A"; rankName = "プロ級"; rankClass = "a-rank"; }
    else if (avgError < 350) { rank = "B"; rankName = "セミプロ"; rankClass = "b-rank"; }
    else { rank = "C"; rankName = "一般人"; rankClass = "c-rank"; }

    const rankEl = document.getElementById("rankText");
    rankEl.innerText = `${rank} [${rankName}]`;
    rankEl.className = rankClass;
    document.getElementById("resultText").innerText = `${name}さんの平均誤差: ${avgError} Hz`;
    
    drawGraph();
    sendScoreToGAS(name, avgError);
}

function sendScoreToGAS(name, score) {
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode') || "community";
    const data = { name: name, score: score, mode: mode };

    fetch(GAS_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify(data)
    }).catch(e => console.error(e));
}

function copyToClipboard() {
    const name = document.getElementById("playerName").value || "名無し";
    const avgError = Math.round(totalError / totalQuestions);
    let resultStr = `🎧 【周波数当てゲーム】 🎧\n👤 プレイヤー: ${name} さん\n📊 平均誤差: ${avgError} Hz\n遊んだURL: ${window.location.href.split('?')[0]}`;
    navigator.clipboard.writeText(resultStr).then(() => {
        document.getElementById("copyStatus").innerText = "✅ コピー完了！";
    });
}

function drawGraph() {
    const canvas = document.getElementById("graph");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const margin = 40, h = canvas.height - margin * 2, w = canvas.width - margin * 2;
    const maxFreq = 2200;
    const barWidth = (w / results.length) / 3.5;

    results.forEach((r, i) => {
        const baseX = margin + i * (w / results.length) + 10;
        const h1 = (r.correct / maxFreq) * h, y1 = canvas.height - margin - h1;
        ctx.fillStyle = "#ff4757"; ctx.fillRect(baseX, y1, barWidth, h1);
        const h2 = (r.answer / maxFreq) * h, y2 = canvas.height - margin - h2;
        ctx.fillStyle = "#00d4ff"; ctx.fillRect(baseX + barWidth, y2, barWidth, h2);
        ctx.fillStyle = "#333"; ctx.font = "10px sans-serif";
        ctx.fillText(`Q${i+1}`, baseX + barWidth, canvas.height - 10);
    });
}

function resetGame() {
    location.reload();
}
</script>

</body>
</html>
